name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  proxy-boundary:
    name: Proxy boundary (no code deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # don't fetch the submodule; we want to guard against this repo
          # importing proxy packages, not build anything from the submodule
          submodules: false

      - name: Forbid imports from clawvisor/proxy
        run: |
          set -euo pipefail
          # The proxy is intentionally a separate repo with no Go code
          # dependency from this one. Any import of github.com/clawvisor/proxy/*
          # would cross that boundary and make the submodule a hard dep
          # rather than a dev-ergonomics convenience. Fail CI if any such
          # import appears.
          if grep -R --include='*.go' -n 'github.com/clawvisor/proxy' . ; then
            echo "::error::Go file imports github.com/clawvisor/proxy/* — this repo must not depend on the proxy repo at the code level. See docs/proxy-api.md §3.4."
            exit 1
          fi

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            extensions/clawvisor/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      # Build the OpenClaw plugin tarball BEFORE go test/vet/build — the
      # server binary go:embeds it, and a missing file would compile
      # against the NOTE.md sentinel and serve 503 to cloud users. The
      # canonical distribution for the cloud deployment is
      # `GET /skill/openclaw-plugin.tgz`, so every build must carry a
      # real, current plugin bundle.
      - name: Bundle OpenClaw plugin
        run: cd extensions/clawvisor && npm ci && npm run bundle

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  plugin:
    name: OpenClaw Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/clawvisor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/clawvisor/package-lock.json

      - run: npm ci

      - name: Test
        run: npm test

      - name: Bundle
        run: npm run bundle

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Type check
        run: tsc --noEmit

      - name: Build
        run: npm run build
