name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  contain-parity:
    name: Contain parity (spec 09)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Re-run the deterministic e2e scenario suite under the Contain posture:
      # the runtime proxy is booted and LLM traffic is routed through
      # proxy-lite (llm_route=proxy_lite). Every Govern scenario must pass
      # byte-identical, proving Contain is a strict superset by construction.
      # This lane gates exposing Contain; until it is required-blocking the
      # posture stays behind experimental_contain (config + module gate).
      #
      # -count=1 is required: Go's test cache does not key on the
      # CLAWVISOR_E2E_POSTURE env var, and setup-go@v5 shares GOCACHE across
      # jobs by go.sum, so without it the default-posture lane's cached result
      # would satisfy this lane and it would never run under Contain.
      - name: Contain-posture scenarios
        env:
          CLAWVISOR_E2E_POSTURE: contain
        run: go test -count=1 ./e2e/scenarios/...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Type check
        run: tsc --noEmit

      - name: Build
        run: npm run build

  browser:
    name: Browser (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build server
        # Mirrors the Makefile `build` target's invocation.
        run: go build -o bin/clawvisor-server ./cmd/clawvisor-server

      - name: Install browser-lane deps
        run: cd e2e/browser && npm ci

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./e2e/browser/node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Chromium
        run: cd e2e/browser && npx playwright install --with-deps chromium

      - name: Run browser lane
        run: cd e2e/browser && npx playwright test
        env:
          CLAWVISOR_BIN: ${{ github.workspace }}/bin/clawvisor-server

      - name: Upload report + traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/browser/playwright-report/
            e2e/browser/test-results/
          retention-days: 7
