name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binaries and checksums
        run: scripts/build-release.sh "${{ needs.release-please.outputs.tag_name }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* --clobber

  publish-skill:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Check for skill changes
        id: skill-changes
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Fetch all tags so we can find the previous release
          git fetch --tags --quiet
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -v "^${TAG_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, treating as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$PREV_TAG" HEAD | grep -qE '^skills/clawvisor/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.skill-changes.outputs.changed == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        if: steps.skill-changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare skill folder
        if: steps.skill-changes.outputs.changed == 'true'
        run: |
          mkdir -p dist/skill
          go run ./cmd/render-skill claude-code > dist/skill/SKILL.md
          cp skills/clawvisor/README.md dist/skill/README.md
          cp -r skills/clawvisor/policies dist/skill/policies

      - name: Publish to ClawHub
        if: steps.skill-changes.outputs.changed == 'true'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npx clawhub auth login --token "$CLAWHUB_TOKEN" --no-browser
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          npx clawhub publish "$GITHUB_WORKSPACE/dist/skill" --slug clawvisor --version "$VERSION"
