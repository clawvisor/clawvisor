name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binaries and checksums
        run: scripts/build-release.sh "${{ inputs.version }}"

      - name: Create release if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ inputs.version }}" > /dev/null 2>&1; then
            prerelease_flag=""
            case "${{ inputs.version }}" in
              *-*) prerelease_flag="--prerelease" ;;
            esac
            gh release create "${{ inputs.version }}" \
              --title "${{ inputs.version }}" \
              --generate-notes \
              $prerelease_flag
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.version }}" dist/* --clobber
