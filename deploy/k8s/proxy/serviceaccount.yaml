# Workload Identity binding. The annotation links this K8s SA to the
# GCP SA `clawvisor-proxy-workload@clawvisor-staging.iam.gserviceaccount.com`,
# created by the Terraform spec. The pod assumes the GCP SA's IAM
# (Vertex, Secret Manager, Cloud SQL, Memorystore) without baking
# credentials into the image.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clawvisor-proxy
  namespace: clawvisor-proxy
  annotations:
    # Update PROJECT_ID per environment (clawvisor-staging vs clawvisor-prod).
    iam.gke.io/gcp-service-account: clawvisor-proxy-workload@clawvisor-staging.iam.gserviceaccount.com
