# HPA on aggregate CPU. Phase 0.5 decision Branch A means no ClientIP
# session affinity is required, so HPA can scale on aggregate load
# without bucket-awareness. Tune target after Phase 0.10 measures real
# CPU/connection ratios under load.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clawvisor-proxy
  namespace: clawvisor-proxy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clawvisor-proxy
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # 5 min — avoid thrash
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
