# Secret SHELLS only — actual values are injected post-apply.
#
# Two paths to populate:
#   (a) External Secrets Operator (preferred): replace these with
#       ExternalSecret resources pointing at Google Secret Manager
#       paths from the TF spec.
#   (b) Manual one-shot:
#         kubectl create secret generic clawvisor-proxy-secrets \
#             --namespace clawvisor-proxy \
#             --from-literal=VAULT_MASTER_KEY=$(gcloud secrets versions access latest --secret=clawvisor-proxy-vault-master-key) \
#             --from-literal=SECRET_CACHE_HMAC_KEY=$(gcloud secrets versions access latest --secret=clawvisor-proxy-secret-cache-hmac) \
#             --from-literal=DATABASE_PASSWORD=...
#
# This file documents the expected shape and is safe to commit because
# it carries no values.
apiVersion: v1
kind: Secret
metadata:
  name: clawvisor-proxy-secrets
  namespace: clawvisor-proxy
type: Opaque
stringData:
  VAULT_MASTER_KEY: "REPLACE_ME_FROM_SECRET_MANAGER"
  SECRET_CACHE_HMAC_KEY: "REPLACE_ME_FROM_SECRET_MANAGER"
  # Postgres password is unused when Cloud SQL Auth Proxy uses IAM auth;
  # keep here for the fallback static-credential path.
  DATABASE_PASSWORD: "REPLACE_ME"
  # Memorystore AUTH (only if AUTH is enabled on the instance).
  REDIS_PASSWORD: "REPLACE_ME"
