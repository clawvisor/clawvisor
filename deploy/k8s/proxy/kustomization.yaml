apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clawvisor-proxy

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret-refs.yaml
  - certificate.yaml
  - deployment.yaml
  - service.yaml
  - pdb.yaml
  - hpa.yaml
  - networkpolicy.yaml

# To deploy:
#   kubectl apply -k clawvisor/deploy/k8s/proxy/
#
# Per-environment overrides (staging vs prod) should live in a
# kustomize overlay directory next to this base, e.g.
#   clawvisor/deploy/k8s/proxy/overlays/staging/
#   clawvisor/deploy/k8s/proxy/overlays/prod/
# Each overlay patches the loadBalancerIP, image tag, replica counts,
# Memorystore/SQL host placeholders, and master_authorized_networks.
