version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawvisor
      POSTGRES_PASSWORD: clawvisor
      POSTGRES_DB: clawvisor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawvisor"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    container_name: clawvisor
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "25297:25297"
    environment:
      DATABASE_URL: "postgres://clawvisor:clawvisor@postgres:5432/clawvisor"
      DATABASE_DRIVER: "postgres"
      JWT_SECRET: "${JWT_SECRET}"
      SERVER_HOST: "0.0.0.0"
      VAULT_BACKEND: "local"
      VAULT_KEY: "${VAULT_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      CLAWVISOR_LLM_VERIFICATION_ENABLED: "${CLAWVISOR_LLM_VERIFICATION_ENABLED:-false}"
      CLAWVISOR_LLM_VERIFICATION_PROVIDER: "${CLAWVISOR_LLM_VERIFICATION_PROVIDER:-}"
      CLAWVISOR_LLM_VERIFICATION_ENDPOINT: "${CLAWVISOR_LLM_VERIFICATION_ENDPOINT:-}"
      CLAWVISOR_LLM_VERIFICATION_MODEL: "${CLAWVISOR_LLM_VERIFICATION_MODEL:-}"
      CLAWVISOR_LLM_VERIFICATION_API_KEY: "${CLAWVISOR_LLM_VERIFICATION_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy

  # Optional local OpenTelemetry collector for users with no observability
  # stack. Starts only with `docker compose --profile observability up`.
  # Point Clawvisor at it with:
  #   observability.otel.enabled: true
  #   observability.otel.endpoint: "otel-collector:4317"
  #   observability.otel.insecure: true
  # (or the CLAWVISOR_OTEL_* env equivalents). Exported spans/metrics show up
  # in this collector's debug log: `docker compose logs -f otel-collector`.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: clawvisor-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  postgres_data:
